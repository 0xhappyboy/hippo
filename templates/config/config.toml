lang = "zh"

[smtp]
host = "smtp.gmail.com"
port = 587
username = "your-email@gmail.com"
password = "your-app-password"
from = "your-email@gmail.com"

[telegram]
bot_token = "1234567890:ABCdefGHIJKLMNopqrsTUVwxyz"

[dingding]
access_token = "your-dingtalk-access-token"

[feishu]
webhook = "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"

[wecom]
webhook = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx"

[ftp]
host = "ftp.example.com"
port = 21
username = "your-username"
password = "your-password"
remote_dir = "/uploads"
timeout = 30
mode = "binary"

[tcp]
host = "0.0.0.0"
port = 8888
timeout = 30
encoding = "utf8"

[udp]
host = "0.0.0.0"
port = 9999
timeout = 30
encoding = "utf8"
broadcast = false

[postgresql]
host = "localhost"
port = 5432
database = "myapp_db"
username = "postgres"
password = "postgres-password"
pool_size = 10
timeout = 30

[mysql]
host = "localhost"
port = 3306
database = "myapp_db"
username = "root"
password = "mysql-password"
pool_size = 10
timeout = 30

[redis]
host = "localhost"
port = 6379
password = "redis-password"
db = 0
pool_size = 10
timeout = 30

[sqlite]
path = "./data/app.db"
pool_size = 5
timeout = 30

[github]
token = "github_pat_xxx"
api_url = "https://api.github.com"
timeout = 30
